version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: lms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: AP_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: devops/Dockerfile
    container_name: lms_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=lms_main.settings
      # Override DB host to point to postgres container (not localhost)
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=AP_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    ports:
      - "8000:8000"
    volumes:
      # ✅ CRITICAL: Media files are persisted here across container rebuilds/restarts.
      # Without this volume, all uploaded profile photos and documents are lost
      # every time the container is rebuilt or restarted.
      - media_files:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  # Named volume for media files — survives container recreation
  media_files:
    driver: local
