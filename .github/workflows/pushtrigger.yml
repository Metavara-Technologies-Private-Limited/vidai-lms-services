name: VIDAI-LMS-SERVICES Push Trigger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -f devops/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/vidai-backend:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/vidai-backend:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Pull latest image"
            docker pull ${{ secrets.DOCKER_USERNAME }}/vidai-backend:latest

            echo "Stop old container"
            docker ps -aq --filter "name=vidai-backend" | xargs -r docker stop
            docker ps -aq --filter "name=vidai-backend" | xargs -r docker rm

            echo "Start new container"
            docker run -d \
              --restart always \
              --name vidai-backend \
              -p 8004:8000 \
              --add-host=host.docker.internal:host-gateway \
              --env-file /root/lms.env \
              -v /var/www/vidai-media:/app/media \
              ${{ secrets.DOCKER_USERNAME }}/vidai-backend:latest

            echo "Wait container boot"
            sleep 12
                   
            echo "Run database migrations"
            docker exec vidai-backend python manage.py migrate || true
