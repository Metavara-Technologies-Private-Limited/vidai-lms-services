name: LMS-Clinic Backend Push Trigger

on:
  push:
    branches:
      - main-us

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ================= CHECKOUT CODE =================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ================= DOCKER BUILDX =================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ================= DOCKER LOGIN =================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ================= BUILD IMAGE =================
      - name: Build Docker image
        run: |
          docker build \
            -f devops/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/clinic-backend:latest .

      # ================= PUSH IMAGE =================
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/clinic-backend:latest

      # ================= DEPLOY TO VPS =================
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          script: |

            echo "Pull latest backend image"
            docker pull ${{ secrets.DOCKER_USERNAME }}/clinic-backend:latest

            echo "Stop old backend container"
            docker stop clinic-backend || true

            echo "Remove old backend container"
            docker rm clinic-backend || true

            echo "Start clinic backend container"

            docker run -d \
              --restart always \
              --name clinic-backend \
              -p 8006:8000 \
              --env-file /root/lms-us.env \
              -v /var/www/clinic-media:/app/media \
              ${{ secrets.DOCKER_USERNAME }}/clinic-backend:latest

            echo "Wait for backend startup"
            sleep 15

            echo "Run migrations"
            docker exec clinic-backend python manage.py migrate || true

            echo "Backend deployment completed"

            docker ps
